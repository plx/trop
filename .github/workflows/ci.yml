name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}

  
jobs:

  navigation-guide:
    name: Navigation Guide
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install agentic-navigation-guide
        run: cargo install agentic-navigation-guide

      - name: Verify navigation guide
        run: agentic-navigation-guide verify

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Just
        uses: extractions/setup-just@v3

      - name: Install Rust toolchain
        # Version pinned in rust-toolchain.toml; bump both together.
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt

      - name: Check formatting
        run: just ci-check-format

  licenses:
    name: License audit (THIRD_PARTY_LICENSES.md)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Just
        uses: extractions/setup-just@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-about
        uses: taiki-e/install-action@v2
        with:
          # Pinned: the license audit diffs generated output against the
          # committed THIRD_PARTY_LICENSES.md, so a new cargo-about release
          # that tweaks formatting or detection would flake this gate.
          # Bump deliberately, regenerating the file in the same commit.
          tool: cargo-about@0.9.0

      - name: Verify THIRD_PARTY_LICENSES.md is current
        run: just ci-check-licenses


  build:
    name: Build
    needs: [fmt, navigation-guide]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Just
        uses: extractions/setup-just@v3 

      - name: Install Rust toolchain
        # Version pinned in rust-toolchain.toml; bump both together.
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build all targets
        run: just ci-build-all-${{ matrix.profile }}

  clippy:
    name: Clippy
    needs: [build]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Just
        uses: extractions/setup-just@v3 

      - name: Install Rust toolchain
        # Version pinned in rust-toolchain.toml; bump both together.
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: just ci-run-clippy-${{ matrix.profile }}

  docs:
    name: Documentation
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Just
        uses: extractions/setup-just@v3 

      - name: Install Rust toolchain
        # Version pinned in rust-toolchain.toml; bump both together.
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check documentation
        run: just ci-check-docs

      - name: Spot-check doctests (debug)
        run: just ci-run-doc-tests-debug


  test:
    name: Test (${{ matrix.profile }}) on ${{ matrix.os }}
    needs: [build, fmt, clippy, docs, navigation-guide, licenses]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        profile: [debug, release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Just
        uses: extractions/setup-just@v3

      - name: Install Rust toolchain
        # Version pinned in rust-toolchain.toml; bump both together.
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy

      # Use Swatinem/rust-cache for more efficient caching than manual cache actions
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build ${{ matrix.profile }}
        run: just ci-build-${{ matrix.profile }}

      - name: Run doc tests 
        run: just ci-run-doc-tests-${{ matrix.profile }}
        
      - name: Run unit and integration tests
        run: just ci-run-tests-${{ matrix.profile }}

      - name: Run concurrency tests
        if: matrix.profile == 'release'
        run: just ci-run-concurrency-tests-${{ matrix.profile }}        
