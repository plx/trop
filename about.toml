# cargo-about configuration
# https://embarkstudios.github.io/cargo-about/
#
# Regenerate THIRD_PARTY_LICENSES.md with: just licenses
# CI verifies the file is up-to-date with: just ci-check-licenses

# Target triples are listed explicitly so generation is deterministic across
# host platforms (otherwise cargo-about scans only the host's target). These
# match the platforms in the test matrix in .github/workflows/ci.yml plus the
# common Linux/macOS/Windows variants users are likely to install on.
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

# License IDs we permit anywhere in the dependency graph. Every crate must
# satisfy its license expression using only IDs from this list. Adding a new
# license here is a deliberate act — review the new dependency's terms first.
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "CC0-1.0",
    "MIT-0",
]

# Workspace crates have no third-party license obligations to surface.
ignore-build-dependencies = false
ignore-dev-dependencies = false
ignore-transitive-dependencies = false

# Per-crate license clarifications — none required at present. If a crate
# ships a non-standard LICENSE file or its Cargo.toml license metadata is
# ambiguous, add a [<crate-name>] section here. Example:
#   [<crate>]
#   accepted = ["MIT"]
#   [[<crate>.clarify]]
#   license = "MIT"
#   [[<crate>.clarify.git]]
#   path = "LICENSE-MIT"
#   checksum = "..."
